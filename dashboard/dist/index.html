<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paperclip - Agent Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; font-family: 'Segoe UI', system-ui, sans-serif; }
    #app { width: 100%; height: 100%; position: relative; }
    canvas { display: block; }

    #hud {
      position: absolute; top: 16px; left: 16px;
      display: flex; gap: 12px; align-items: center;
      z-index: 10; pointer-events: none;
    }
    #hud .badge {
      background: rgba(10, 10, 20, 0.85); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 8px 14px; color: #e2e8f0;
      font-size: 13px; backdrop-filter: blur(8px);
      display: flex; align-items: center; gap: 6px;
    }
    #hud .dot { width: 8px; height: 8px; border-radius: 50%; }
    #hud .dot.green { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
    #hud .dot.red { background: #f87171; box-shadow: 0 0 6px #f87171; }
    #hud .dot.amber { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; }

    #config-toggle {
      position: absolute; top: 16px; right: 16px; z-index: 20;
      background: rgba(10, 10, 20, 0.85); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 8px 12px; color: #e2e8f0;
      cursor: pointer; font-size: 18px; backdrop-filter: blur(8px);
    }
    #config-toggle:hover { background: rgba(30, 30, 50, 0.9); }

    #config-panel {
      position: absolute; top: 56px; right: 16px; z-index: 20;
      background: rgba(10, 10, 20, 0.92); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 20px; color: #e2e8f0;
      width: 300px; backdrop-filter: blur(12px);
      display: none; font-size: 13px;
    }
    #config-panel.open { display: block; }
    #config-panel h3 { font-size: 14px; margin-bottom: 16px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
    #config-panel label { display: block; margin-bottom: 4px; color: #94a3b8; font-size: 12px; }
    #config-panel input[type="text"], #config-panel input[type="number"] {
      width: 100%; padding: 8px 10px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.3);
      color: #e2e8f0; font-size: 13px; margin-bottom: 12px; outline: none;
    }
    #config-panel input:focus { border-color: #6366f1; }
    #config-panel button {
      width: 100%; padding: 8px; border-radius: 6px; border: none;
      background: #6366f1; color: white; font-size: 13px; cursor: pointer;
    }
    #config-panel button:hover { background: #4f46e5; }
    #config-panel .toggle-row {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
    }

    .agent-label {
      background: rgba(10, 10, 20, 0.85); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 6px 10px; color: #e2e8f0;
      font-size: 11px; text-align: center; white-space: nowrap;
      pointer-events: none; backdrop-filter: blur(4px);
    }
    .agent-label .name { font-weight: 600; font-size: 12px; }
    .agent-label .task { color: #94a3b8; margin-top: 2px; }
  </style>
  <script type="module" crossorigin src="./assets/index-DBOJMDYu.js"></script>
</head>
<body>
  <div id="app">
    <div id="hud"></div>
    <button id="config-toggle">&#9881;</button>
    <div id="config-panel"></div>
  </div>
</body>
</html>
